<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 | Nikhilesh Thiru</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #008080;
      font-family: "MS Sans Serif", Tahoma, sans-serif;
      color: #111;
    }

    .panel {
      width: min(520px, calc(100vw - 32px));
      background: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.38);
    }

    .titlebar {
      background: linear-gradient(90deg, #000080, #1084d0);
      color: #fff;
      font-weight: 700;
      padding: 8px 10px;
      font-size: 14px;
    }

    .content {
      padding: 14px;
      font-size: 14px;
      line-height: 1.45;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    a {
      display: inline-block;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #7c7c7c;
      border-bottom: 2px solid #7c7c7c;
      background: #d4d4d4;
      color: #111;
      text-decoration: none;
      padding: 4px 10px;
      font-size: 13px;
    }

    .sub {
      color: #303030;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <section class="panel" aria-label="Not found">
    <div class="titlebar">Internet Explorer</div>
    <div class="content">
      <strong>404: Page not found.</strong>
      <p>This route is not available. Use the button below to return to the desktop.</p>
      <div class="actions">
        <a href="/">Back To Desktop</a>
      </div>
      <p class="sub">Tip: For static hosts (Cloudflare Pages, Netlify, Vercel), configure rewrites to <code>/index.html</code> when using custom routes.</p>
    </div>
  </section>
</body>
</html>
